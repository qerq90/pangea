  character: "Персонаж"

registration:
  welcome:
    text: |
      Добро пожаловать на Пангею! Для того что бы приступить, отправьте слово «Начать»
      Это текстовая онлайн-ммо- игра «Клеймо Пангеи», все действия в ней происходят при использовании команд под окном чата, результаты этих действий приходят в виде ответа от сообщества. В игре представлено большое число вариативности и уникальности вашего игрового пути к прохождению всей игровой компании. Так же не забывайте взаимодействовать с другими игроками для облегчения своей игры.
      картинка c приветствием
      Прежде всего, проверим управление. Вы видите кнопки внизу?

      ⚠Если у Вас нет кнопок для управления под окном чата - проверьте, что они не скрыты (кнопка "показать/скрыть" в строке набора текста в мобильном приложении, покатана на скрине), а также что используется последняя версия официального мобильного приложения "Вконтакте", либо обычный браузер.
    choices:
      Race: "Начать"

  raceSelect: "Теперь, выберите свою расу. Позже её можно будет сменить."
  nameLabel: "Меня зовут {name}"

  raceDescription:
    confirmLabel: "Подтвердить расу"
    backLabel:
      label: "Вернуться к выбору расы"
      color: "negative"

  preTravel:
    text: "Вы открываете глаза. Практически ничего не видно, только сверху проблёскивает свет звёзд. Тяжело дышать, вы замкнуты и стеснены в движениях, рядом лишь камни и земля, кажется ваших сил хватит что бы выбраться наверх."
    choices:
      Travel1: "Выбраться наверх"

  endTravel: "Вы выходите из таверны и отправляетесь в подземелье"
  startingEquipment: "В вашем рюкзаке найдено стартовое снаряжение: комплект брони новобранца (7 предметов), меч новобранца и фляга начинающего исследователя."

  travel:
    Travel1:
      text: "Вы начали двигаться вверх, раздвигая тяжёлые и мокрые камни впереди себя. Спустя несколько минут ваших усилий. Вы выбрались и оказались в лесу... немного осмотревшись вы поняли, что вылезали не из каменного завала, а из целой горы трупов..."
      choices:
        Travel2: "Как же болит моя голова"

    Travel2:
      text: "При попытках вспомнить хоть, что-то, ваша голова только сильнее начинала болеть. Здравый смысл подсказывал лишь, что надо лишь двигаться подальше от места где лежат одни трупы самых разных невиданных ранее существ и рас..."
      choices:
        Travel3: "Идти дальше прочь от этого места"

    Travel3:
      text: "С трудом пройдя десятки метров, вы замечаете как среди трупов бродит фигура, чьё лицо и тело спрятано под накидкой, когда же она обращает на вас внимание, на вашей руке загорается странный символ и кажется сейчас от боли вы потеряете сознание."
      choices:
        Travel4: "Потерять сознание..."

    Travel4:
      text: "Неопределенное время, вы ощущаете будто бродите в тумане из своих мыслей. Нет ни солнца, ни луны, никакого источника света или понимая, безцельное блуждание на задворках неизвестности...\nОднако ветер доносит до вас обрывки фраз...«Жизненные силы восполняются с каждым днём, серьёзных травм нет. В общем будет жить» — сказал неизвестный голос.\n«Надеюсь, что все так и будет...» — прозвучал трепетно, необычайно нежный голос неизвестного, но кажется родного для вас существа..."
      choices:
        Travel5: "Открыть глаза"

    Travel5:
      text: "Вы проснулись в белоснежной кровати, тело чувствуется лёгким и абсолютно здоровым, вы проверяете свои конечности, и они слушаются вас без каких-либо проблем, при попытке встать с кровати, она предательски издаёт скрип, в эту же секунду вы слышите топот ног откуда-то снизу поднимающий всё ближе к вам.\nЕщё несколько секунд и в комнату врывается вместе со свежим и холодным воздухом, девушка-человек, одетая в форму служанки.\n«Вам уже лучше! Это хорошо. Я сейчас же позову хозяйку, и принесу еду, ни в коем случае никуда не уходите! Вам нужно по-есть, и не бойтесь, всё уже оплачено!»."
      choices:
        Travel6: "Кивнуть девушке и осмотреть комнату"

    Travel6:
      text: "Вы осматриваете помещение. Судя по всему это гостиная комната для одного посетителя, есть пустой шкаф с одеждой, небольшой рюкзак, стол за которым можно поесть, а так же вы обнаружили на себе незнакомую но чистую одежду, идеально подходящую под вашу комплекцию.В дверь входит служанка и ставит миску с, аппетитно пахнущим супом на стол, кладёт несколько ломтиков хлеба и уходит пожелав вам приятного аппетита. Вы почуствовали сильный голод, и немедленно принялись за трапезу."
      choices:
        Travel7: "Наконец то еда!"

    Travel7:
      text: "Спустя несколько минут, в комнату вошла другая высокая женщина - человек, её лицо было посечено шрамами, но оно излучала доброту, которая никаким образом не подходила такому лицу. По одежде можно было понять, что она не служанка.\n«Доброе утро. Я Вельсмера , хозяйка здешней таверны.» представилась она."
      choices:
        Travel8: "Меня зовут {displayName}"

    Travel8:
      text: "«Приятно познакомиться» — Сказала она. «А теперь я расскажу вам об этом месте. Судя по всему вы здесь впервые. Наш маленький город зовётся Кинэт,  тут практически нет опытных искателей, но здесь есть все необходимое для размеренной жизни и хорошей пенсии вдали от многих угроз этого мира. Однако это не для тебя. Искательница, что принесла тебя, сказала, что ты обязательно пойдёшь в лабиринт. Она оплатила комнату для тебя и лекаря, а так же начальную экипировку для тебя.» — весьма бодро и с непонятно откуда взявшейся добротой звучали её слова."
      choices:
        Travel9: "Кто она?"

    Travel9:
      text: "«Не знаю. В прочем она оставила для тебя письмо. Сообщила о том, что тебе будет крайне интересно его прочесть, а так же сказала отдать его тебе, когда ты принесёшь мне две тысячи золотых. В целом, была рада познакомиться, с сегодняшнего дня, просто лежать в постели у тебя уже не получится, теперь уже я буду требовать с вас плату» — продолжала говорит она."
      choices:
        EndOfTravel: "Отправиться в подземелье"

